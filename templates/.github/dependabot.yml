version: 2
updates:
  # Uncomment once your project has a package.json — registering the npm
  # ecosystem before then makes Dependabot error on every scan.
  # - package-ecosystem: 'npm'
  #   directory: '/'
  #   schedule:
  #     interval: 'weekly'
  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'weekly'
  - package-ecosystem: 'docker'
    directory: '/.devcontainer'
    schedule:
      interval: 'weekly'
  - package-ecosystem: 'devcontainers'
    directory: '/'
    schedule:
      interval: 'weekly'
