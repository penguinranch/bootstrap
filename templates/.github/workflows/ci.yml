name: CI Pipeline

on:
  push:
    branches: ['main']
  pull_request:
    branches: ['main']

# Cancel redundant runs on the same branch
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      # --- Node.js Setup (replace with your stack) ---
      # If your project uses a different language, replace this section.
      # See AGENTS.md for instructions on mapping stack-specific commands to the Makefile.
      # Every step is gated on a lockfile existing, so a freshly scaffolded
      # project (no stack chosen yet) stays green on its first push.
      - name: Note unconfigured stack
        if: hashFiles('package-lock.json') == ''
        run: echo "No package-lock.json found — stack not chosen yet, skipping build steps."

      - name: Use Node.js
        if: hashFiles('package-lock.json') != ''
        uses: actions/setup-node@v6
        with:
          node-version: '24.x'
          cache: 'npm'

      - name: Install dependencies
        if: hashFiles('package-lock.json') != ''
        run: npm ci --ignore-scripts

      - name: Run lint
        if: hashFiles('package-lock.json') != ''
        run: npm run lint --if-present

      - name: Run tests
        if: hashFiles('package-lock.json') != ''
        run: npm test --if-present

      # --- Python Setup (alternative) ---
      # For Python projects with a src/ layout, you may need PYTHONPATH:
      #   env:
      #     PYTHONPATH: src
