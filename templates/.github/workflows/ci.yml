name: CI Pipeline

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

# Cancel redundant runs on the same branch
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # --- Node.js Setup (replace with your stack) ---
      # If your project uses a different language, replace this section.
      # See AGENTS.md for instructions on mapping stack-specific commands to the Makefile.
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.x"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Run lint
        run: npm run lint --if-present

      - name: Run tests
        run: npm test --if-present

      # --- Python Setup (alternative) ---
      # For Python projects with a src/ layout, you may need PYTHONPATH:
      #   env:
      #     PYTHONPATH: src
