version: 2
updates:
  # Maintain GitHub Actions used in this repo AND shipped in the template
  # payload. Dependabot only appends .github/workflows for the '/' directory;
  # any other directory is scanned literally, so the payload's workflows must
  # be listed by their full path.
  - package-ecosystem: 'github-actions'
    directories:
      - '/'
      - '/templates/.github/workflows'
    schedule:
      interval: 'weekly'

  # Maintain Docker base images in the root devcontainer and the template
  # payload's devcontainer
  - package-ecosystem: 'docker'
    directories:
      - '/.devcontainer'
      - '/templates/.devcontainer'
    schedule:
      interval: 'weekly'

  # Maintain devcontainer features for this repo and the template payload
  - package-ecosystem: 'devcontainers'
    directories:
      - '/'
      - '/templates'
    schedule:
      interval: 'weekly'
