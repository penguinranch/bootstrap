name: Devcontainer Build Validation

on:
  push:
    branches: [main, booting]
  pull_request:
    branches: [main]

jobs:
  build-root:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      # runCmd proves the tooling inside the container works, not just that
      # the image builds — a container with broken make/shellcheck/gitleaks
      # used to pass this job.
      - name: Build root devcontainer
        uses: devcontainers/ci@v0.3
        with:
          subFolder: .
          push: never
          runCmd: |
            make doctor
            make lint
            command -v gitleaks

  build-template:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Build template devcontainer
        uses: devcontainers/ci@v0.3
        with:
          subFolder: templates
          push: never
          runCmd: |
            make help
            make doctor
            command -v gitleaks
