name: Shell Script Linting

on:
  push:
    branches: [main, booting]
  pull_request:
    branches: [main]

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Run shellcheck
        run: |
          shellcheck install.sh scripts/*.sh templates/scripts/*.sh .githooks/* templates/.githooks/*

      - name: Verify shared utils stay in sync
        run: |
          diff -u scripts/utils.sh templates/scripts/utils.sh
