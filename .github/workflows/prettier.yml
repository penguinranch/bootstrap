name: Formatting Check

on:
  push:
    branches: [main, booting]
  pull_request:
    branches: [main]

jobs:
  prettier:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run Prettier check
        run: |
          npx -y prettier --check "**/*.{md,json,yml}"
